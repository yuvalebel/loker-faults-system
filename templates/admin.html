<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול מיילים — אדון לוקר</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background: #f4f6fa; font-family: 'Segoe UI', Arial, sans-serif; }
        .page-header { background: linear-gradient(135deg, #1a237e, #283593); color: #fff; padding: 1.5rem 0; margin-bottom: 1.5rem; }
        .card-box { background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); padding: 1.5rem; margin-bottom: 1.5rem; }
        .email-row { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-bottom: 1px solid #eef1f5; }
        .email-row:last-child { border-bottom: none; }
        .email-text { flex: 1; font-family: monospace; font-size: 0.95rem; }
        .admin-badge { background: #1a237e; color: #fff; padding: 2px 8px; border-radius: 8px; font-size: 0.75rem; }
        .you-badge { background: #fb8c00; color: #fff; padding: 2px 8px; border-radius: 8px; font-size: 0.75rem; }
        .warning-banner { background: #fff3cd; border: 1px solid #ffeaa7; padding: 12px 16px; border-radius: 8px; color: #856404; }
    </style>
</head>
<body>

<div class="page-header">
    <div class="container d-flex justify-content-between align-items-center">
        <h1 class="m-0 h3"><i class="bi bi-people"></i> ניהול מיילים מורשים</h1>
        <a href="/" class="btn btn-outline-light btn-sm"><i class="bi bi-arrow-right"></i> חזרה למערכת</a>
    </div>
</div>

<div class="container">

    <div class="warning-banner mb-4">
        <i class="bi bi-info-circle"></i>
        <strong>חשוב לדעת:</strong> הוספת מייל כאן פותחת לו גישה למערכת,
        אבל גם צריך להוסיף אותו ב-<a href="https://console.cloud.google.com/apis/credentials" target="_blank">Google Cloud Console</a>
        ברשימת <strong>Test users</strong>. בלי שני המקומות — לא יוכל להיכנס.
    </div>

    <!-- Add Email -->
    <div class="card-box">
        <h5 class="mb-3"><i class="bi bi-plus-circle"></i> הוספת מייל חדש</h5>
        <div class="d-flex gap-2">
            <input type="email" id="newEmail" class="form-control" placeholder="example@gmail.com" autocomplete="off">
            <button class="btn btn-primary" onclick="addEmail()"><i class="bi bi-plus"></i> הוסף</button>
        </div>
    </div>

    <!-- Email List -->
    <div class="card-box">
        <h5 class="mb-3"><i class="bi bi-list"></i> רשימת מיילים מורשים <span id="count" class="badge bg-secondary"></span></h5>
        <div id="emailList"><div class="text-center text-muted">טוען...</div></div>
    </div>

</div>

<script>
let currentUser = null;

async function loadEmails() {
    try {
        const r = await fetch('/api/admin/emails');
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const data = await r.json();
        currentUser = data.current_user;
        document.getElementById('count').textContent = data.emails.length;
        renderList(data.emails);
    } catch (e) {
        document.getElementById('emailList').innerHTML =
            '<div class="text-danger">שגיאה בטעינה: ' + esc(e.message) + '</div>';
    }
}

function renderList(emails) {
    if (emails.length === 0) {
        document.getElementById('emailList').innerHTML = '<div class="text-muted text-center py-3">אין מיילים ברשימה</div>';
        return;
    }
    document.getElementById('emailList').innerHTML = emails.map(e => {
        const isYou = e.email === (currentUser || '').toLowerCase();
        const cantDelete = e.is_admin || isYou;
        const badges = [];
        if (e.is_admin) badges.push('<span class="admin-badge">מנהל</span>');
        if (isYou) badges.push('<span class="you-badge">אתה</span>');
        return `<div class="email-row">
            <div class="email-text">${esc(e.email)}</div>
            ${badges.join(' ')}
            ${cantDelete ? '' : `<button class="btn btn-sm btn-outline-danger" onclick="removeEmail('${encodeURIComponent(e.email)}')"><i class="bi bi-trash"></i></button>`}
        </div>`;
    }).join('');
}

async function addEmail() {
    const input = document.getElementById('newEmail');
    const email = input.value.trim().toLowerCase();
    if (!email || !email.includes('@')) {
        alert('אנא הקלד מייל תקין');
        return;
    }
    try {
        const r = await fetch('/api/admin/emails', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({email})
        });
        const data = await r.json();
        if (!r.ok) throw new Error(data.error || 'HTTP ' + r.status);
        input.value = '';
        await loadEmails();
        if (!confirm('המייל נוסף.\n\nשים לב: עדיין צריך להוסיף את ' + email + ' גם ב-Google Cloud Test Users.\n\nלפתוח את Google Cloud עכשיו?')) return;
        window.open('https://console.cloud.google.com/apis/credentials', '_blank');
    } catch (e) {
        alert('שגיאה: ' + e.message);
    }
}

async function removeEmail(emailEncoded) {
    const email = decodeURIComponent(emailEncoded);
    if (!confirm(`להסיר את ${email} מהרשימה?`)) return;
    try {
        const r = await fetch('/api/admin/emails/' + emailEncoded, {method: 'DELETE'});
        const data = await r.json();
        if (!r.ok) throw new Error(data.error || 'HTTP ' + r.status);
        await loadEmails();
    } catch (e) {
        alert('שגיאה: ' + e.message);
    }
}

function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

document.getElementById('newEmail').addEventListener('keypress', e => { if (e.key === 'Enter') addEmail(); });
document.addEventListener('DOMContentLoaded', loadEmails);
</script>

</body>
</html>
