<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>דוחות וניתוח — אדון לוקר</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        body { background: #f4f6fa; font-family: 'Segoe UI', Arial, sans-serif; }
        .page-header { background: linear-gradient(135deg, #1a237e, #283593); color: #fff; padding: 1.5rem 0; }
        .kpi-card { border: none; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .kpi-card .kpi-value { font-size: 2.4rem; font-weight: 700; line-height: 1; }
        .kpi-card .kpi-label { font-size: 0.95rem; color: #6c757d; }
        .kpi-card .kpi-icon { font-size: 1.8rem; opacity: 0.5; }
        .chart-card { background: #fff; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); padding: 1.5rem; }
        .chart-card h5 { color: #283593; font-weight: 600; }
        .empty-state { color: #adb5bd; text-align: center; padding: 2rem 1rem; font-size: 0.95rem; }
        @media print {
            .no-print { display: none !important; }
            body { background: #fff; }
            .page-header { background: #283593 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
</head>
<body>

<div class="page-header">
    <div class="container d-flex align-items-center justify-content-between flex-wrap gap-2">
        <h1 class="m-0 h3"><i class="bi bi-bar-chart-line"></i> דוחות וניתוח</h1>
        <div class="no-print">
            <a href="/" class="btn btn-outline-light btn-sm"><i class="bi bi-arrow-right"></i> חזרה למערכת</a>
            <button class="btn btn-light btn-sm" onclick="window.print()"><i class="bi bi-printer"></i> הדפס</button>
            <a href="/api/reports/export" class="btn btn-success btn-sm"><i class="bi bi-file-earmark-excel"></i> ייצוא לאקסל</a>
        </div>
    </div>
</div>

<div class="container my-4">

    <!-- SCHOOL FILTER -->
    <div class="chart-card mb-4 no-print d-flex align-items-center gap-3 flex-wrap">
        <label for="schoolFilter" class="m-0 fw-bold"><i class="bi bi-funnel"></i> סנן לפי בית ספר:</label>
        <select id="schoolFilter" class="form-select form-select-sm" style="max-width: 320px;">
            <option value="">כל בתי הספר</option>
        </select>
        <span id="filterIndicator" class="badge bg-primary" style="display: none;"></span>
    </div>

    <!-- KPI ROW -->
    <div class="row g-3 mb-4">
        <div class="col-md-3 col-6">
            <div class="kpi-card p-3 d-flex justify-content-between align-items-center bg-white">
                <div>
                    <div class="kpi-value text-primary" id="kpi-total">—</div>
                    <div class="kpi-label">סה"כ תקלות</div>
                </div>
                <i class="bi bi-clipboard-data kpi-icon text-primary"></i>
            </div>
        </div>
        <div class="col-md-3 col-6">
            <div class="kpi-card p-3 d-flex justify-content-between align-items-center bg-white">
                <div>
                    <div class="kpi-value text-warning" id="kpi-open">—</div>
                    <div class="kpi-label">פתוחות</div>
                </div>
                <i class="bi bi-exclamation-circle kpi-icon text-warning"></i>
            </div>
        </div>
        <div class="col-md-3 col-6">
            <div class="kpi-card p-3 d-flex justify-content-between align-items-center bg-white">
                <div>
                    <div class="kpi-value text-success" id="kpi-closed">—</div>
                    <div class="kpi-label">סגורות</div>
                </div>
                <i class="bi bi-check-circle kpi-icon text-success"></i>
            </div>
        </div>
        <div class="col-md-3 col-6">
            <div class="kpi-card p-3 d-flex justify-content-between align-items-center bg-white">
                <div>
                    <div class="kpi-value text-danger" id="kpi-urgent">—</div>
                    <div class="kpi-label">דחופות פתוחות</div>
                </div>
                <i class="bi bi-fire kpi-icon text-danger"></i>
            </div>
        </div>
    </div>

    <!-- CHARTS ROW -->
    <div class="row g-3 mb-4">
        <div class="col-md-6">
            <div class="chart-card">
                <h5><i class="bi bi-pie-chart"></i> התפלגות לפי סוג תקלה</h5>
                <div id="type-chart-wrap" style="position: relative; height: 280px;">
                    <canvas id="typeChart"></canvas>
                </div>
                <div id="type-empty" class="empty-state" style="display:none;">אין עדיין תקלות במערכת</div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="chart-card">
                <h5><i class="bi bi-bar-chart"></i> התפלגות לפי חומרה</h5>
                <div id="sev-chart-wrap" style="position: relative; height: 280px;">
                    <canvas id="severityChart"></canvas>
                </div>
                <div id="sev-empty" class="empty-state" style="display:none;">אין עדיין תקלות במערכת</div>
            </div>
        </div>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-12">
            <div class="chart-card">
                <h5><i class="bi bi-graph-up"></i> תקלות לפי חודש (12 חודשים אחרונים)</h5>
                <div id="month-chart-wrap" style="position: relative; height: 280px;">
                    <canvas id="monthChart"></canvas>
                </div>
                <div id="month-empty" class="empty-state" style="display:none;">אין עדיין תקלות במערכת</div>
            </div>
        </div>
    </div>

    <div class="row g-3 mb-4" id="bySchoolRow">
        <div class="col-12">
            <div class="chart-card">
                <h5><i class="bi bi-buildings"></i> תקלות לפי בית ספר</h5>
                <div id="school-chart-wrap" style="position: relative; height: 320px;">
                    <canvas id="schoolChart"></canvas>
                </div>
                <div id="school-empty" class="empty-state" style="display:none;">אין עדיין תקלות במערכת</div>
            </div>
        </div>
    </div>

    <div class="row g-3">
        <div class="col-md-12">
            <div class="chart-card">
                <h5><i class="bi bi-people"></i> תקלות פתוחות לפי טכנאי</h5>
                <div id="tech-table"></div>
            </div>
        </div>
    </div>

</div>

<script>
let schoolsLoaded = false;
const chartInstances = {};

async function loadStats() {
    try {
        const filter = document.getElementById('schoolFilter').value;
        const qs = filter ? ('?school=' + encodeURIComponent(filter)) : '';
        const r = await fetch('/api/reports/stats' + qs);
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const s = await r.json();

        document.getElementById('kpi-total').textContent = s.total;
        document.getElementById('kpi-open').textContent = s.open;
        document.getElementById('kpi-closed').textContent = s.closed;
        document.getElementById('kpi-urgent').textContent = s.urgent_open;

        if (!schoolsLoaded) {
            populateSchoolFilter(s.available_schools);
            schoolsLoaded = true;
        }
        updateFilterIndicator(s.current_filter);

        renderPie('typeChart', 'type-empty', 'type-chart-wrap', s.by_type);
        renderBar('severityChart', 'sev-empty', 'sev-chart-wrap', s.by_severity, 'מספר תקלות');
        renderBar('monthChart', 'month-empty', 'month-chart-wrap', s.by_month, 'מספר תקלות');

        // By-school chart only when viewing all schools
        const bySchoolRow = document.getElementById('bySchoolRow');
        if (s.current_filter) {
            bySchoolRow.style.display = 'none';
        } else {
            bySchoolRow.style.display = '';
            renderBar('schoolChart', 'school-empty', 'school-chart-wrap', s.by_school, 'מספר תקלות');
        }

        renderTechTable(s.by_technician);
    } catch (e) {
        console.error('Failed to load stats', e);
        alert('שגיאה בטעינת הסטטיסטיקות: ' + e.message);
    }
}

function populateSchoolFilter(schools) {
    const sel = document.getElementById('schoolFilter');
    for (const name of (schools || [])) {
        const opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name;
        sel.appendChild(opt);
    }
}

function updateFilterIndicator(filter) {
    const ind = document.getElementById('filterIndicator');
    if (filter) {
        ind.textContent = 'מציג: ' + filter;
        ind.style.display = '';
    } else {
        ind.style.display = 'none';
    }
}

const colors = ['#3949ab','#43a047','#fb8c00','#e53935','#8e24aa','#00897b','#5e35b1','#c0ca33','#6d4c41','#546e7a'];

function destroyChart(canvasId) {
    if (chartInstances[canvasId]) {
        chartInstances[canvasId].destroy();
        delete chartInstances[canvasId];
    }
}

function renderPie(canvasId, emptyId, wrapId, data) {
    destroyChart(canvasId);
    const wrap = document.getElementById(wrapId);
    const empty = document.getElementById(emptyId);
    if (!data || data.length === 0) {
        wrap.style.display = 'none';
        empty.style.display = 'block';
        return;
    }
    wrap.style.display = '';
    empty.style.display = 'none';
    chartInstances[canvasId] = new Chart(document.getElementById(canvasId), {
        type: 'pie',
        data: {
            labels: data.map(d => d.label),
            datasets: [{
                data: data.map(d => d.count),
                backgroundColor: data.map((_, i) => colors[i % colors.length]),
            }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', rtl: true, textDirection: 'rtl' } } }
    });
}

function renderBar(canvasId, emptyId, wrapId, data, label) {
    destroyChart(canvasId);
    const wrap = document.getElementById(wrapId);
    const empty = document.getElementById(emptyId);
    if (!data || data.length === 0) {
        wrap.style.display = 'none';
        empty.style.display = 'block';
        return;
    }
    wrap.style.display = '';
    empty.style.display = 'none';
    chartInstances[canvasId] = new Chart(document.getElementById(canvasId), {
        type: 'bar',
        data: {
            labels: data.map(d => d.label),
            datasets: [{
                label: label,
                data: data.map(d => d.count),
                backgroundColor: '#3949ab'
            }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { precision: 0 } } } }
    });
}

function renderTechTable(data) {
    const wrap = document.getElementById('tech-table');
    if (!data || data.length === 0) {
        wrap.innerHTML = '<div class="empty-state">אין תקלות פתוחות במערכת</div>';
        return;
    }
    let html = '<table class="table table-striped table-sm mb-0"><thead><tr><th>טכנאי</th><th class="text-end">תקלות פתוחות</th></tr></thead><tbody>';
    for (const row of data) {
        html += `<tr><td>${escapeHtml(row.label)}</td><td class="text-end"><strong>${row.count}</strong></td></tr>`;
    }
    html += '</tbody></table>';
    wrap.innerHTML = html;
}

function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

document.addEventListener('DOMContentLoaded', () => {
    loadStats();
    document.getElementById('schoolFilter').addEventListener('change', loadStats);
});
</script>

</body>
</html>
