services:
  locker-faults:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: locker-faults
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    # `default` keeps Traefik routing; `adon-net` is the shared network with the
    # WhatsApp bot (adon-webhook). Declaring it here means the link survives a
    # rebuild — no need to re-run `docker network connect` after every deploy.
    networks:
      - default
      - adon-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      - traefik.enable=true
      - traefik.http.routers.locker-faults.rule=Host(`locker-faults.srv1572400.hstgr.cloud`)
      - traefik.http.routers.locker-faults.entrypoints=websecure
      - traefik.http.routers.locker-faults.tls.certresolver=letsencrypt
      - traefik.http.services.locker-faults.loadbalancer.server.port=5000

networks:
  # Created and owned by the bot side (Shilo). Must already exist on the host.
  adon-net:
    external: true
